# supabase/config.toml
# Supabase CLI local development configuration.
#
# Run `supabase init` if you need to regenerate this file, or update the
# project_id below to match your Supabase project reference.
#
# Find your project reference:
#   Supabase Dashboard → Settings → General → Reference ID
#
# Usage:
#   supabase login                  # authenticate
#   supabase link --project-ref <ref>   # link to remote project
#   supabase db push                # apply all pending migrations
#   supabase db pull                # pull remote schema changes
#   supabase db diff                # diff local vs remote
#   supabase start                  # start local Supabase stack

project_id = "lustre"   # Replace with your Supabase project reference ID

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
